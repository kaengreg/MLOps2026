name: Basic ML Training Scenario

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  train-basic-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make scenario script executable
        run: chmod +x scripts/run_basic.sh

      - name: Run basic training scenario
        run: bash scripts/run_basic.sh

      - name: Upload text log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: basic-scenario-log
          path: artifacts/basic_scenario.log

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: basic-training-artifacts
          path: |
            dev/metrics/training_log.csv
            dev/models/best_model.pkl
            dev/models/best_model_meta.json